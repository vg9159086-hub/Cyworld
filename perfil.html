<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Cyworld</title>

<style>
body{
  margin:0;
  background-image: url('background1.gif');
  background-size: cover;
}

/* BASE */
.perfil{
  width: 1000px;
  height: 600px;
  margin: 20px auto;
  position: relative;
}

/* PAPEL (IMAGEM BASE) */
.paper{
  width:100%;
  position:absolute;
}

/* FOTO PERFIL */
.foto{
  position:absolute;
  top:110px;
  left:60px;
  width:140px;
  height:140px;
  border-radius:15px;
  object-fit:cover;
}

/* NOME */
.nome{
  position:absolute;
  top:260px;
  left:60px;
  width:140px;
  text-align:center;
  font-weight:bold;
}

/* LIKE */
.likes{
  position:absolute;
  top:310px;
  left:60px;
  width:140px;
  text-align:center;
}

/* STATUS */
.status{
  position:absolute;
  top:360px;
  left:40px;
  width:180px;
  font-size:14px;
}

/* UPDATE */
.news{
  position:absolute;
  top:100px;
  left:260px;
  width:400px;
  font-size:14px;
}

/* MINIROOM */
.miniroom{
  position:absolute;
  top:180px;
  left:260px;
  width:400px;
  height:200px;
  overflow:hidden;
}

.miniroom img.bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

#avatar{
  position:absolute;
  width:80px;
  top:100px;
  left:150px;
}

/* FRIENDS */
.friends{
  position:absolute;
  top:400px;
  left:260px;
  width:400px;
  text-align:center;
}

/* MENU LATERAL */
.menu{
  position:absolute;
  right:20px;
  top:120px;
}

.menu div{
  margin-bottom:15px;
  cursor:pointer;
  font-weight:bold;
}

/* PLAYER */
.player{
  position:absolute;
  right:40px;
  bottom:50px;
  text-align:center;
}
</style>
</head>

<body>

<div class="perfil">

<!-- FUNDO COMPLETO -->
<img src="tela.png" class="paper">

<!-- FOTO -->
<img id="fotoPerfil" src="avatar1.png" class="foto">

<!-- NOME -->
<div class="nome" id="nomeUser">vitor0415</div>

<!-- LIKE -->
<div class="likes">
👍 170 &nbsp;&nbsp; 👎 20
</div>

<!-- STATUS -->
<div class="status" id="status">today is 😆😘💋</div>

<!-- UPDATE -->
<div class="news" id="update">
Vitor acabou de fazer uma sessão de fotos<br>
Vitor postou foto nova em sua Galeria<br>
more...
</div>

<!-- MINIROOM -->
<div class="miniroom">
  <img id="roomBg" src="room1.gif" class="bg">
  <img id="avatar" src="avatar1.png">
</div>

<!-- FRIENDS -->
<div class="friends">
<b>What friends say:</b><br>
OMG SLAY!! lindo!!!!
</div>

<!-- MENU -->
<div class="menu">
  <div onclick="ir('diario.html')">DIÁRIO</div>
  <div onclick="ir('galeria.html')">GALERIA</div>
  <div onclick="ir('avisos.html')">QUADRO</div>
  <div onclick="ir('info.html')">INFO</div>
  <div onclick="ir('edit.html')">EDITAR</div>
</div>

<!-- PLAYER -->
<div class="player">
KISSING YOU - SNSD<br>
▶️ ⏸ ⏭
</div>

</div>

<script>

// carregar dados salvos
function carregar(){
  document.getElementById("status").innerText = localStorage.getItem("status") || "today is 😆";
  document.getElementById("roomBg").src = localStorage.getItem("room") || "room1.gif";
  document.getElementById("avatar").src = localStorage.getItem("avatar") || "avatar1.png";
  document.getElementById("fotoPerfil").src = localStorage.getItem("foto") || "avatar1.png";
}

carregar();

// navegação
function ir(p){
  window.location.href = p;
}

</script>

</body>
</html>
