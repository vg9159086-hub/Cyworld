<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyworld Perfil</title>

<style>
body {
  margin: 0;
  background-size: cover;
  font-family: Tahoma;
}

/* ÁREA PRINCIPAL */
.perfil-container {
  width: 900px;
  height: 600px;
  margin: auto;
  position: relative;
}

/* PAPEL */
.perfil-base {
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* FOTO PERFIL */
.foto {
  position: absolute;
  top: 90px;
  left: 60px;
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 15px;
}

/* NOME */
.nome {
  position: absolute;
  top: 250px;
  left: 70px;
  font-size: 20px;
  font-weight: bold;
}

/* STATUS */
.status {
  position: absolute;
  top: 310px;
  left: 60px;
  width: 150px;
}

/* MINIROOM */
.miniroom {
  position: absolute;
  top: 180px;
  left: 300px;
  width: 450px;
  height: 200px;
  overflow: hidden;
}

/* FUNDO ROOM */
.roomBg {
  width: 100%;
  height: 100%;
}

/* AVATAR */
#avatar {
  position: absolute;
  width: 110px;
  top: 90px;
  left: 150px;
}

/* TEXTO NEWS */
.news {
  position: absolute;
  top: 70px;
  left: 280px;
  width: 400px;
  font-size: 14px;
}

/* WHAT FRIENDS SAY */
.friends {
  position: absolute;
  bottom: 60px;
  left: 300px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="perfil-container">

<!-- BASE -->
<img src="background1.gif" class="perfil-base" id="bg">

<!-- FOTO -->
<img src="avatar1.png" class="foto" id="fotoPerfil">

<!-- NOME -->
<div class="nome" id="nomeUser">Usuário</div>

<!-- STATUS -->
<input class="status" id="statusInput">

<!-- UPDATE NEWS -->
<div class="news" id="news">
UPDATE NEWS!<br>
Você entrou no perfil!
</div>

<!-- MINIROOM -->
<div class="miniroom">
  <img src="room1.gif" class="roomBg" id="roomBg">
  <img src="avatar1.png" id="avatar">
</div>

<!-- FRIENDS -->
<div class="friends">
OMG SLAY!! lindo!!!!
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyAHdlW4ro1ot0Tcc5810ufCBnyU3f2uI-M",
 authDomain: "cyworld-24d00.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN FIX */
auth.onAuthStateChanged(user=>{
 if(user){
  let nome = user.email.split("@")[0];
  document.getElementById("nomeUser").innerText = "Perfil de " + nome;
 } else {
  location.href = "index.html";
 }
});

/* DRAG MOBILE + PC */
let avatar = document.getElementById("avatar");

avatar.onmousedown = drag;
avatar.ontouchstart = dragTouch;

function drag(e){
 document.onmousemove = (ev)=>{
  avatar.style.left = ev.pageX - 400 + "px";
  avatar.style.top = ev.pageY - 250 + "px";
 };
 document.onmouseup = ()=> document.onmousemove = null;
}

function dragTouch(e){
 document.ontouchmove = (ev)=>{
  let t = ev.touches[0];
  avatar.style.left = t.pageX - 400 + "px";
  avatar.style.top = t.pageY - 250 + "px";
 };
 document.ontouchend = ()=> document.ontouchmove = null;
}

/* CARREGAR DADOS */
let dados = JSON.parse(localStorage.getItem("perfil"));

if(dados){
 document.getElementById("avatar").src = dados.avatar;
 document.getElementById("roomBg").src = dados.room;
 document.getElementById("bg").src = dados.bg;
 document.getElementById("statusInput").value = dados.status;
}
</script>

</body>
</html>
