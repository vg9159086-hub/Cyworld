<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil</title>

<style>
body{
  margin:0;
  background:black;
}

/* CONTAINER */
.perfil{
  position:relative;
  width:100%;
  max-width:1000px;
  margin:auto;
}

/* IMAGEM BASE (SEU LAYOUT REAL) */
.base{
  width:100%;
}

/* FOTO PERFIL */
.foto{
  position:absolute;
  top:120px;
  left:70px;
  width:140px;
  height:140px;
  border-radius:20px;
  object-fit:cover;
}

/* MINIROOM */
.miniroom{
  position:absolute;
  top:210px;
  left:300px;
  width:420px;
  height:220px;
}

.miniroom img.bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* AVATAR */
#avatar{
  position:absolute;
  width:90px;
  top:110px;
  left:150px;
}

/* STATUS */
.status{
  position:absolute;
  top:420px;
  left:70px;
  width:200px;
  font-size:14px;
}

/* UPDATE */
.news{
  position:absolute;
  top:130px;
  left:300px;
  width:400px;
  font-size:14px;
}

/* FRIENDS */
.friends{
  position:absolute;
  top:450px;
  left:300px;
  width:400px;
  text-align:center;
}

/* MENU (CLIQUE INVISÍVEL) */
.btn{
  position:absolute;
  width:200px;
  height:50px;
  right:20px;
  cursor:pointer;
}

#diario{ top:130px; }
#galeria{ top:190px; }
#avisos{ top:250px; }
#info{ top:310px; }
#edit{ top:370px; }

</style>
</head>

<body>

<div class="perfil">

<!-- SUA IMAGEM COMPLETA -->
<img src="SEU_LAYOUT.png" class="base">

<!-- FOTO -->
<img id="fotoPerfil" src="avatar1.png" class="foto">

<!-- UPDATE -->
<div class="news">
Vitor acabou de fazer uma sessão de fotos<br>
Nova foto na galeria<br>
more...
</div>

<!-- MINIROOM -->
<div class="miniroom">
  <img id="roomBg" src="room1.gif" class="bg">
  <img id="avatar" src="avatar1.png">
</div>

<!-- STATUS -->
<div class="status" id="status">today is 😆😘💋</div>

<!-- FRIENDS -->
<div class="friends">
OMG SLAY!! lindo!!!!
</div>

<!-- BOTÕES INVISÍVEIS -->
<div id="diario" class="btn" onclick="ir('diario.html')"></div>
<div id="galeria" class="btn" onclick="ir('galeria.html')"></div>
<div id="avisos" class="btn" onclick="ir('avisos.html')"></div>
<div id="info" class="btn" onclick="ir('info.html')"></div>
<div id="edit" class="btn" onclick="ir('edit.html')"></div>

</div>

<script>

// carregar dados
function carregar(){
  document.getElementById("status").innerText = localStorage.getItem("status") || "today is 😆";
  document.getElementById("roomBg").src = localStorage.getItem("room") || "room1.gif";
  document.getElementById("avatar").src = localStorage.getItem("avatar") || "avatar1.png";
  document.getElementById("fotoPerfil").src = localStorage.getItem("foto") || "avatar1.png";
}

carregar();

function ir(p){
  window.location.href = p;
}

</script>

</body>
</html>
