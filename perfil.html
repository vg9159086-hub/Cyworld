<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Cyworld</title>

<style>
body{
  margin:0;
  font-family: Tahoma;
  background-image: url('background1.gif');
  background-size: cover;
}

/* CONTAINER */
.perfil{
  width: 1000px;
  margin: 20px auto;
  position: relative;
}

/* PAPEL */
.paper{
  background-image: url('tela.png');
  background-size: cover;
  padding: 20px;
  border-radius: 20px;
}

/* LAYOUT */
.top{
  display: flex;
}

/* ESQUERDA */
.left{
  width: 250px;
  text-align: center;
}

.foto{
  width: 150px;
  height:150px;
  border-radius: 20px;
  border:5px solid hotpink;
  object-fit: cover;
}

.nome{
  font-size: 18px;
  margin-top:10px;
}

.like{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  font-size:20px;
}

/* DIREITA */
.right{
  flex:1;
  padding-left:20px;
}

/* UPDATE */
.news{
  font-weight:bold;
  color: hotpink;
}

/* MINIROOM */
.miniroom{
  margin-top:10px;
  position: relative;
  width: 100%;
  height: 250px;
  border-radius:20px;
  overflow:hidden;
}

.miniroom img.bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

#avatar{
  width:80px;
  position:absolute;
  top:120px;
  left:100px;
}

/* MENU LATERAL */
.menu-lateral{
  position:absolute;
  right:-150px;
  top:50px;
}

.menu-lateral div{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:20px;
  cursor:pointer;
}

/* PLAYER */
.player{
  position:absolute;
  right:-150px;
  bottom:20px;
  background:pink;
  padding:15px;
  border-radius:20px;
  text-align:center;
}

/* FRIENDS */
.friends{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="perfil">

<div class="paper">

<div class="top">

<!-- ESQUERDA -->
<div class="left">

<img id="fotoPerfil" src="avatar1.png" class="foto">

<div class="nome" id="nomeUser">Usuário</div>

<div class="like">
👍 <span id="likes">170</span>
👎 <span id="dislikes">20</span>
</div>

<p id="status">today is: 😆😘💋</p>

</div>

<!-- DIREITA -->
<div class="right">

<div class="news">UPDATE NEWS!</div>
<p id="update">Você entrou no perfil!</p>

<div class="miniroom">
<img id="roomBg" src="room1.gif" class="bg">
<img id="avatar" src="avatar1.png">
</div>

<div class="friends">
<b>What friends say:</b><br>
OMG SLAY!! lindo!!!!
</div>

</div>

</div>

</div>

<!-- MENU LATERAL -->
<div class="menu-lateral">
<div onclick="ir('diario.html')">DIÁRIO</div>
<div onclick="ir('galeria.html')">GALERIA</div>
<div onclick="ir('avisos.html')">AVISOS</div>
<div onclick="ir('info.html')">INFO</div>
<div onclick="ir('edit.html')">EDITAR</div>
</div>

<!-- PLAYER -->
<div class="player">
<b id="musica">KISSING YOU - SNSD</b><br>
▶️ ⏸ ⏭
</div>

</div>

<script>

// LOGIN (corrige bug)
firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  }else{
    document.getElementById("nomeUser").innerText = user.email.split("@")[0];
  }
});

// CARREGAR DADOS SALVOS
function carregar(){
  document.getElementById("status").innerText = localStorage.getItem("status") || "today is 😆";
  document.getElementById("roomBg").src = localStorage.getItem("room") || "room1.gif";
  document.getElementById("avatar").src = localStorage.getItem("avatar") || "avatar1.png";
  document.getElementById("fotoPerfil").src = localStorage.getItem("foto") || "avatar1.png";
  document.body.style.backgroundImage = "url("+ (localStorage.getItem("bg") || "background1.gif") +")";
}

carregar();

// NAVEGAÇÃO
function ir(pagina){
  window.location.href = pagina;
}

</script>

</body>
</html>
