<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Cyworld</title>

<style>
body {
  font-family: Tahoma;
  background-image: url('background1.gif');
  background-size: cover;
  margin: 0;
}

.container {
  width: 1100px;
  margin: auto;
  background: white;
  border: 2px solid #ff8c42;
}

.header {
  background: #ff8c42;
  padding: 15px;
  display: flex;
  align-items: center;
}

.menu {
  background: #ffa366;
  padding: 10px;
}

.menu span {
  margin-right: 20px;
  cursor: pointer;
}

.layout {
  display: flex;
}

.left {
  width: 250px;
  padding: 10px;
}

.center {
  flex: 1;
  padding: 10px;
}

.box {
  background: #fff7f0;
  border: 1px solid #ffb380;
  margin-bottom: 10px;
  padding: 10px;
}

/* MINIROOM */
.miniroom {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}

.miniroom img.bg {
  width: 100%;
  height: 100%;
}

#avatar {
  width: 90px; /* maior */
  position: absolute;
  top: 120px;
  left: 100px;
  cursor: grab;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" style="height:40px;">
  <b>Cyworld - Perfil</b>
</div>

<div class="menu">
  <span onclick="location.href='index.html'">HOME</span>
  <span onclick="location.href='diario.html'">DIÁRIO</span>
  <span onclick="location.href='galeria.html'">GALERIA</span>
  <span onclick="location.href='info.html'">INFORMAÇÕES</span>
  <span onclick="location.href='edit.html'">EDITAR</span>
</div>

<div class="layout">

<div class="left">
<div class="box">

<img id="avatarPreview" src="avatar1.png" style="width:120px;"><br><br>

<b id="nomeUser">Usuário</b><br><br>

Status:<br>
<input id="status"><br><br>

Avatar:<br>
<select onchange="trocarAvatar(this.value)">
<script>
for(let i=1;i<=8;i++){
  document.write(`<option value="avatar${i}.png">Avatar ${i}</option>`)
}
</script>
</select>

</div>
</div>

<div class="center">

<div class="box">
<b>UPDATE NEWS</b>
<p id="news">Você entrou no perfil!</p>
</div>

<div class="box">
<b>Miniroom</b>

<div class="miniroom">
<img id="roomBg" src="room1.gif" class="bg">
<img id="avatar" src="avatar1.png">
</div>

<select onchange="trocarRoom(this.value)">
<script>
for(let i=1;i<=72;i++){
 document.write(`<option value="room${i}.gif">Room ${i}</option>`)
}
</script>
</select>

</div>

<div class="box">
<b>What friends say</b>
<p>“OMG SLAY!!”</p>
<p>“Lindo!!!! 😭💖”</p>
</div>

</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyAHdlW4ro1ot0Tcc5810ufCBnyU3f2uI-M",
 authDomain: "cyworld-24d00.firebaseapp.com",
 projectId: "cyworld-24d00",
 storageBucket: "cyworld-24d00.firebasestorage.app",
 messagingSenderId: "972543536924",
 appId: "1:972543536924:web:6b3d375e75ff17c0f514d9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 mantém login
auth.onAuthStateChanged(user => {
 if(user){
   let nome = user.email.split("@")[0];
   document.getElementById("nomeUser").innerText = nome;
 } else {
   location.href = "index.html";
 }
});

// trocar avatar
function trocarAvatar(src){
 document.getElementById("avatar").src = src;
 document.getElementById("avatarPreview").src = src;
}

// trocar room
function trocarRoom(src){
 document.getElementById("roomBg").src = src;
}

// 🧠 DRAG MOBILE + PC
let avatar = document.getElementById("avatar");

avatar.onmousedown = dragMouse;
avatar.ontouchstart = dragTouch;

function dragMouse(e){
 e.preventDefault();
 document.onmousemove = move;
 document.onmouseup = () => document.onmousemove = null;
}

function dragTouch(e){
 let touch = e.touches[0];
 document.ontouchmove = moveTouch;
 document.ontouchend = () => document.ontouchmove = null;
}

function move(e){
 avatar.style.left = e.pageX - 50 + "px";
 avatar.style.top = e.pageY - 200 + "px";
}

function moveTouch(e){
 let t = e.touches[0];
 avatar.style.left = t.pageX - 50 + "px";
 avatar.style.top = t.pageY - 200 + "px";
}
</script>

</body>
</html>
