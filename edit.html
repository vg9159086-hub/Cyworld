<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Perfil - Cyworld</title>

<style>
body {
  font-family: Tahoma;
  margin: 0;
  background-size: cover;
}

.container {
  width: 1100px;
  margin: auto;
  background: white;
  border: 2px solid #ff8c42;
}

.header {
  background: #ff8c42;
  padding: 15px;
}

.menu {
  background: #ffa366;
  padding: 10px;
}

.menu span {
  margin-right: 20px;
  cursor: pointer;
}

.box {
  padding: 10px;
  margin: 10px;
  border: 1px solid #ffb380;
  background: #fff7f0;
}

.preview {
  position: relative;
  height: 300px;
  overflow: hidden;
  border: 2px solid #aaa;
}

.preview img.bg {
  width: 100%;
  height: 100%;
}

#previewAvatar {
  position: absolute;
  width: 90px;
  top: 120px;
  left: 100px;
}

.sticker {
  width: 50px;
  position: absolute;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <b>Editar Perfil</b>
</div>

<div class="menu">
  <span onclick="location.href='perfil.html'">PERFIL</span>
</div>

<div class="box">

Status:<br>
<input id="status"><br><br>

Foto de perfil:<br>
<input type="file" id="foto"><br><br>

Avatar:<br>
<select id="avatarSelect">
<script>
for(let i=1;i<=8;i++){
 document.write(`<option value="avatar${i}.png">Avatar ${i}</option>`)
}
</script>
</select><br><br>

Miniroom:<br>
<select id="roomSelect">
<script>
for(let i=1;i<=72;i++){
 document.write(`<option value="room${i}.gif">Room ${i}</option>`)
}
</script>
</select><br><br>

Background:<br>
<select id="bgSelect">
<script>
for(let i=1;i<=11;i++){
 document.write(`<option value="background${i}.gif">BG ${i}</option>`)
}
</script>
</select><br><br>

Cor do site:<br>
<select id="cor">
<option value="#ff8c42">Laranja</option>
<option value="green">Verde</option>
<option value="blue">Azul</option>
<option value="black">Preto</option>
<option value="gold">Amarelo</option>
</select><br><br>

<button onclick="salvar()">SALVAR TUDO</button>

</div>

<div class="box">
<b>Pré-visualização</b>

<div class="preview">
<img id="previewBg" class="bg" src="room1.gif">
<img id="previewAvatar" src="avatar1.png">
</div>

</div>

<div class="box">
<b>Adesivos</b><br>
<div id="stickers"></div>
</div>

</div>

<script>
// carregar adesivos
for(let i=1;i<=39;i++){
 let img = document.createElement("img");
 img.src = `adesivo${i}.png`;
 img.style.width = "50px";
 img.onclick = () => addSticker(img.src);
 document.getElementById("stickers").appendChild(img);
}

// adicionar sticker
function addSticker(src){
 let img = document.createElement("img");
 img.src = src;
 img.className = "sticker";
 img.style.top = "50px";
 img.style.left = "50px";

 img.onmousedown = dragMouse;
 img.ontouchstart = dragTouch;

 document.querySelector(".preview").appendChild(img);
}

// DRAG
function dragMouse(e){
 let el = e.target;
 document.onmousemove = (ev)=>{
  el.style.left = ev.pageX - 50 + "px";
  el.style.top = ev.pageY - 200 + "px";
 };
 document.onmouseup = ()=> document.onmousemove = null;
}

function dragTouch(e){
 let el = e.target;
 document.ontouchmove = (ev)=>{
  let t = ev.touches[0];
  el.style.left = t.pageX - 50 + "px";
  el.style.top = t.pageY - 200 + "px";
 };
 document.ontouchend = ()=> document.ontouchmove = null;
}

// preview updates
document.getElementById("avatarSelect").onchange = (e)=>{
 previewAvatar.src = e.target.value;
}

document.getElementById("roomSelect").onchange = (e)=>{
 previewBg.src = e.target.value;
}

// salvar tudo
function salvar(){
 let data = {
  status: document.getElementById("status").value,
  avatar: document.getElementById("avatarSelect").value,
  room: document.getElementById("roomSelect").value,
  bg: document.getElementById("bgSelect").value,
  cor: document.getElementById("cor").value
 };

 localStorage.setItem("perfil", JSON.stringify(data));

 alert("Salvo!");
}
</script>

</body>
</html>
